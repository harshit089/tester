<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Briefing — CAT Prep News Digest</title>
<meta name="description" content="A 6-hourly news digest covering geopolitics, economy, business and national affairs for CAT exam preparation.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1d29;
    --surface: #232838;
    --surface-raised: #2a2f3f;
    --paper: #f7f5f0;
    --paper-dim: #c7c4bc;
    --rust: #c9622a;
    --rust-bright: #e0793c;
    --slate: #8a8f9e;
    --line: #353c4f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Inter', -apple-system, sans-serif;
    line-height: 1.5;
  }

  a { color: inherit; }

  ::selection { background: var(--rust); color: var(--paper); }

  .skip-link {
    position: absolute;
    left: -999px;
    top: 0;
    background: var(--rust);
    color: var(--paper);
    padding: 8px 16px;
    z-index: 100;
  }
  .skip-link:focus { left: 8px; top: 8px; }

  /* ---- Masthead ---- */
  header.masthead {
    border-bottom: 1px solid var(--line);
    padding: 28px 24px 22px;
  }
  .masthead-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .masthead-title {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 1.7rem;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .masthead-title .dot { color: var(--rust); }
  .masthead-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  main { max-width: 860px; margin: 0 auto; padding: 0 24px 80px; }

  /* ---- Dispatch / brief block ---- */
  .dispatch {
    margin-top: 36px;
    padding: 24px 26px;
    background: var(--surface);
    border-left: 3px solid var(--rust);
    position: relative;
  }
  .dispatch-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: var(--rust-bright);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dispatch-label::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--rust-bright);
    display: inline-block;
  }
  .dispatch-text {
    font-family: 'Source Serif 4', serif;
    font-size: 1.18rem;
    line-height: 1.55;
    color: var(--paper);
    margin: 0;
  }

  /* ---- Clock / cadence strip ---- */
  .cadence {
    margin-top: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--slate);
    letter-spacing: 0.03em;
  }
  .cadence .next-update { color: var(--paper-dim); }
  .cadence .next-update strong { color: var(--rust-bright); font-weight: 500; }

  /* ---- Category sections ---- */
  .category {
    margin-top: 46px;
  }
  .category-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
  }
  .category-name {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 1.05rem;
    letter-spacing: 0.01em;
  }
  .category-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--slate);
  }

  .article {
    background: var(--surface);
    border-top: 2px solid var(--rust);
    padding: 16px 18px;
    margin-bottom: 12px;
    transition: background 0.15s ease;
  }
  .article:hover { background: var(--surface-raised); }

  .article-title {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 1.02rem;
    line-height: 1.4;
    margin: 0 0 8px;
  }
  .article-title a { text-decoration: none; }
  .article-title a:hover { color: var(--rust-bright); }
  .article-title a:focus-visible {
    outline: 2px solid var(--rust-bright);
    outline-offset: 3px;
  }

  .article-summary {
    font-size: 0.92rem;
    color: var(--paper-dim);
    margin: 0 0 10px;
  }

  .article-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* ---- History selector ---- */
  .history-bar {
    margin-top: 56px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .history-bar label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  select#history-select {
    background: var(--surface);
    color: var(--paper);
    border: 1px solid var(--line);
    padding: 7px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    border-radius: 2px;
  }
  select#history-select:focus-visible {
    outline: 2px solid var(--rust-bright);
    outline-offset: 2px;
  }

  /* ---- States ---- */
  .state-msg {
    margin-top: 60px;
    text-align: center;
    color: var(--slate);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
  }

  footer {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 60px;
    color: var(--slate);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    text-align: center;
    letter-spacing: 0.03em;
  }

  @media (max-width: 600px) {
    .masthead-title { font-size: 1.4rem; }
    .dispatch { padding: 18px 18px; }
    .dispatch-text { font-size: 1.05rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>

<header class="masthead">
  <div class="masthead-inner">
    <h1 class="masthead-title">The Briefing<span class="dot">.</span></h1>
    <div class="masthead-sub">CAT Prep News Digest — Updated every 6 hours</div>
  </div>
</header>

<main id="main">
  <div id="content">
    <p class="state-msg">Loading latest digest…</p>
  </div>

  <div class="history-bar" id="history-bar" hidden>
    <label for="history-select">Browse past digests</label>
    <select id="history-select"></select>
  </div>
</main>

<footer>
  Sources via GNews · Summaries generated with Groq (Llama 3.3) · Built for CAT preparation
</footer>

<script>
(function () {
  const contentEl = document.getElementById('content');
  const historyBar = document.getElementById('history-bar');
  const historySelect = document.getElementById('history-select');

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function formatTimestamp(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString('en-IN', {
        dateStyle: 'medium',
        timeStyle: 'short',
        timeZone: 'Asia/Kolkata',
      }) + ' IST';
    } catch (e) {
      return iso;
    }
  }

  function nextUpdateLabel(generatedAtIso) {
    const generated = new Date(generatedAtIso).getTime();
    const next = generated + 6 * 60 * 60 * 1000;
    const now = Date.now();
    const diffMs = next - now;
    if (diffMs <= 0) return 'due now';
    const hrs = Math.floor(diffMs / 3600000);
    const mins = Math.floor((diffMs % 3600000) / 60000);
    return `~${hrs}h ${mins}m`;
  }

  function renderDigest(digest) {
    const categories = digest.categories || {};
    const categoryNames = Object.keys(categories);

    let html = '';

    html += `
      <div class="dispatch">
        <div class="dispatch-label">Today's Brief</div>
        <p class="dispatch-text">${escapeHtml(digest.brief)}</p>
      </div>
      <div class="cadence">
        <span>Published ${escapeHtml(formatTimestamp(digest.generated_at))}</span>
        <span class="next-update">Next update in <strong>${nextUpdateLabel(digest.generated_at)}</strong></span>
      </div>
    `;

    for (const category of categoryNames) {
      const items = categories[category] || [];
      if (items.length === 0) continue;

      html += `
        <section class="category">
          <div class="category-header">
            <span class="category-name">${escapeHtml(category)}</span>
            <span class="category-count">${items.length} ${items.length === 1 ? 'story' : 'stories'}</span>
          </div>
      `;

      for (const item of items) {
        const safeUrl = (item.url || '').startsWith('http') ? item.url : '#';
        html += `
          <article class="article">
            <h3 class="article-title"><a href="${escapeHtml(safeUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a></h3>
            <p class="article-summary">${escapeHtml(item.summary)}</p>
            <div class="article-meta">${escapeHtml(item.source || 'Unknown source')}</div>
          </article>
        `;
      }

      html += `</section>`;
    }

    contentEl.innerHTML = html;
  }

  function populateHistory(history) {
    if (history.length <= 1) return;
    historyBar.hidden = false;
    historySelect.innerHTML = history
      .map((d, i) => `<option value="${i}">${escapeHtml(formatTimestamp(d.generated_at))}</option>`)
      .join('');
    historySelect.addEventListener('change', (e) => {
      renderDigest(history[parseInt(e.target.value, 10)]);
    });
  }

  fetch('data/digests.json', { cache: 'no-store' })
    .then((res) => {
      if (!res.ok) throw new Error('digests.json not found (HTTP ' + res.status + ')');
      return res.json();
    })
    .then((history) => {
      if (!Array.isArray(history) || history.length === 0) {
        contentEl.innerHTML = '<p class="state-msg">No digest published yet. Check back after the next scheduled run.</p>';
        return;
      }
      renderDigest(history[0]);
      populateHistory(history);
    })
    .catch((err) => {
      contentEl.innerHTML = '<p class="state-msg">Could not load the digest right now. ' + escapeHtml(err.message) + '</p>';
    });
})();
</script>
</body>
</html>
